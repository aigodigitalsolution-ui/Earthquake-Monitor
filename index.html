<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuakeWatch</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        #map { position: absolute; inset: 0; z-index: 1; }
        .header { z-index: 50; }
        
        .bottom-sheet {
            z-index: 60;
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            transform: translateY(calc(100% - 70px));
        }
        .bottom-sheet.open {
            transform: translateY(0) !important;
        }
        
        .alert-popup {
            animation: alertPop 0.4s ease;
        }
        @keyframes alertPop {
            0% { transform: translate(-50%, -120%); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }

        .tsunami-alert {
            animation: tsunamiPulse 2s infinite;
        }
        @keyframes tsunamiPulse {
            0%, 100% { background-color: #b91c1c; }
            50% { background-color: #dc2626; }
        }

        /* Compact mobile optimization */
        .compact-btn {
            padding: 0.45rem 0.7rem;
            font-size: 0.75rem;
            height: 36px;
        }

        /* Light mode styles */
        .light body {
            background-color: #f8fafc;
            color: #0f172a;
        }
        .light .header {
            background-color: rgba(255,255,255,0.95);
            border-color: #e2e8f0;
        }
        .light .bg-zinc-900 { background-color: #f1f5f9; }
        .light .bg-zinc-950 { background-color: #f8fafc; }
        .light .border-zinc-700 { border-color: #cbd5e1; }
        .light .border-zinc-800 { border-color: #e2e8f0; }
        .light .text-white { color: #0f172a; }
        .light .text-zinc-400 { color: #64748b; }
        .light .text-zinc-500 { color: #64748b; }
        .light .bg-zinc-800 { background-color: #e2e8f0; }
        .light .bottom-sheet { background-color: #f8fafc; border-color: #e2e8f0; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden h-screen relative">
    <!-- Header -->
    <header class="header absolute top-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-lg p-3 border-b border-zinc-800 z-50">
        <div class="flex justify-between items-center">
            <!-- Title without globe icon -->
            <div>
                <h1 class="text-lg font-bold tracking-tight">QuakeWatch</h1>
                <p class="text-[9px] text-emerald-400 -mt-0.5">USGS + NOAA</p>
            </div>
            
            <div class="flex items-center gap-1.5">
                <!-- Recent Button -->
                <button onclick="toggleSidebar()" 
                        class="compact-btn flex items-center gap-1 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl font-medium transition">
                    📋 <span class="hidden sm:inline">Recent</span>
                </button>

                <!-- Safety Button -->
                <button onclick="showSafetyModal()" 
                        class="compact-btn flex items-center gap-1 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl font-medium transition">
                    🛡️ <span class="hidden sm:inline">Safety</span>
                </button>

                <!-- View Toggle - Text hidden on mobile -->
                <button onclick="toggleView()" id="toggleBtn"
                        class="compact-btn flex items-center gap-1 bg-zinc-900 border border-zinc-700 hover:border-emerald-400 rounded-3xl font-medium transition">
                    <span id="viewIcon" class="text-base">🌐</span>
                    <span id="viewText" class="hidden sm:inline text-xs">World</span>
                </button>

                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()" id="themeBtn"
                        class="w-8 h-8 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-2xl flex items-center justify-center text-base transition">
                    🌙
                </button>

                <!-- GPS (Hidden) -->
                <button onclick="getUserLocation()" 
                        class="hidden w-8 h-8 bg-emerald-600 hover:bg-emerald-500 rounded-2xl flex items-center justify-center text-lg flex-shrink-0">📍</button>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <!-- Tsunami Warning Banner -->
    <div id="tsunamiBanner" class="hidden fixed top-[68px] left-4 right-4 z-[55] tsunami-alert rounded-3xl p-4 shadow-2xl border border-red-400">
        <div class="flex gap-3 items-start">
            <div class="text-3xl">🌊</div>
            <div class="flex-1 min-w-0">
                <div class="font-bold text-base" id="tsunamiTitle">TSUNAMI WARNING</div>
                <div id="tsunamiMessage" class="text-xs mt-1 leading-tight"></div>
                <div id="tsunamiSource" class="text-[10px] text-red-200 mt-1"></div>
            </div>
            <button onclick="dismissTsunamiBanner()" class="text-red-200 hover:text-white text-xl mt-0.5">✕</button>
        </div>
    </div>

    <!-- Bottom Sheet -->
    <div id="sidebar" class="bottom-sheet fixed bottom-0 left-0 right-0 bg-zinc-900 rounded-t-3xl shadow-2xl flex flex-col max-h-[82vh]">
        <div onclick="toggleSidebar()" class="w-11 h-1 bg-zinc-600 rounded-full mx-auto mt-3 cursor-pointer"></div>
        <div class="px-5 py-3 border-b border-zinc-700 flex justify-between text-sm font-medium">
            <span>Recent Earthquakes</span>
            <span id="count" class="bg-zinc-800 text-xs px-3 py-0.5 rounded-full"></span>
        </div>
        <div id="earthquakeList" class="flex-1 overflow-auto p-3 space-y-3"></div>
    </div>

    <!-- Safety Modal -->
    <div id="safetyModal" class="hidden fixed inset-0 bg-black/70 flex items-end lg:items-center justify-center z-[100] p-4">
        <div class="bg-zinc-900 light:bg-white rounded-3xl max-w-lg w-full max-h-[85vh] overflow-hidden">
            <div class="p-5 border-b border-zinc-700 light:border-zinc-200 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🛡️</span>
                    <div>
                        <h2 class="text-lg font-bold">Earthquake & Tsunami Safety</h2>
                        <p class="text-xs text-emerald-400">Official Guidance</p>
                    </div>
                </div>
                <button onclick="closeSafetyModal()" class="text-2xl text-zinc-400 hover:text-white">✕</button>
            </div>
            
            <div class="p-6 overflow-auto max-h-[65vh] space-y-6 text-sm">
                <div>
                    <h3 class="font-semibold text-red-400 mb-3">🌊 TSUNAMI WARNING PROTOCOL</h3>
                    <ul class="space-y-3 text-xs">
                        <li class="flex gap-3"><span class="text-red-400 font-bold">→</span> <span><strong>Immediate evacuation</strong> to higher ground if near coast</span></li>
                        <li class="flex gap-3"><span class="text-red-400 font-bold">→</span> <span>Do not wait for official alerts</span></li>
                    </ul>
                </div>
                <div class="text-xs text-zinc-400 light:text-zinc-500 border-t border-zinc-700 light:border-zinc-200 pt-4">
                    Data from: NOAA Tsunami Warning Centers
                </div>
            </div>
            
            <div class="p-4 border-t border-zinc-700 light:border-zinc-200">
                <button onclick="closeSafetyModal()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-medium text-sm">
                    Stay Informed • Stay Safe
                </button>
            </div>
        </div>
    </div>

    <!-- Alert Popup -->
    <div id="alertPopup" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white rounded-3xl shadow-2xl p-5 max-w-[90%] z-[100] alert-popup">
        <div class="flex gap-4 items-start">
            <div class="text-4xl">🚨</div>
            <div class="flex-1">
                <div class="font-bold text-lg flex items-center gap-2" id="alertMag"></div>
                <div id="alertPlace" class="text-sm mt-1"></div>
                <div id="alertTime" class="text-xs text-red-200 mt-1"></div>
            </div>
        </div>
        <button onclick="closeAlert()" class="absolute top-4 right-4 text-red-200 hover:text-white text-2xl">✕</button>
    </div>

    <script>
        let currentData = [];
        let userLat = null, userLon = null;
        let isWorldwide = true;
        let isDarkMode = true;

        function getMagColor(mag) {
            if (mag >= 7) return '#ef4444';
            if (mag >= 6) return '#f97316';
            if (mag >= 5) return '#eab308';
            return '#84cc16';
        }

        function createQuakeMarker(feature) {
            const p = feature.properties;
            const [lon, lat] = feature.geometry.coordinates;
            const mag = p.mag || 0;

            const marker = L.circleMarker([lat, lon], {
                radius: Math.max(6, Math.min(mag * 2.6, 11)),
                fillColor: getMagColor(mag),
                color: '#fff',
                weight: 2.5,
                fillOpacity: 0.85
            });

            marker.bindPopup(`<b>${mag}</b> — ${p.place}<br><small>${new Date(p.time).toLocaleString()}</small>`);
            return marker;
        }

        async function fetchEarthquakes() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
                const data = await res.json();
                const newData = data.features;

                if (currentData.length > 0) {
                    const newStrong = newData.filter(n => !currentData.some(old => old.id === n.id) && n.properties.mag >= 5);
                    newStrong.forEach(showAlert);
                }

                currentData = newData;

                quakeCluster.clearLayers();
                currentData.forEach(f => {
                    if (f.properties.mag >= 2.5) quakeCluster.addLayer(createQuakeMarker(f));
                });

                updateList();
            } catch(e) { console.error(e); }
        }

        async function fetchTsunamiWarnings() {
            try {
                const res = await fetch('https://www.tsunami.gov/tiles/tsunami.json', { mode: 'cors' }).catch(() => null);
                if (res && res.ok) {
                    const data = await res.json();
                    if (data && data.messages && data.messages.length > 0) {
                        const latest = data.messages[0];
                        showTsunamiWarning(latest);
                    }
                } else {
                    checkTsunamiFromQuakes();
                }
            } catch (e) {
                checkTsunamiFromQuakes();
            }
        }

        function checkTsunamiFromQuakes() {
            const potential = currentData.filter(q => {
                const mag = q.properties.mag || 0;
                const place = (q.properties.place || '').toLowerCase();
                return mag >= 6.8 && (place.includes('ocean') || place.includes('pacific') || place.includes('coast'));
            });
            
            if (potential.length > 0) {
                showTsunamiWarning({
                    title: "Potential Tsunami Threat",
                    message: `${potential[0].properties.mag}M earthquake detected. Coastal areas should be alert.`,
                    source: "USGS + NOAA Correlation",
                    time: potential[0].properties.time
                });
            }
        }

        function showTsunamiWarning(tsunami) {
            const banner = document.getElementById('tsunamiBanner');
            document.getElementById('tsunamiTitle').textContent = '🌊 TSUNAMI WARNING';
            document.getElementById('tsunamiMessage').textContent = tsunami.message || tsunami.title || "Tsunami alert issued for affected regions.";
            document.getElementById('tsunamiSource').textContent = tsunami.source || "NOAA Tsunami Warning Center";
            banner.classList.remove('hidden');
        }

        function dismissTsunamiBanner() {
            document.getElementById('tsunamiBanner').classList.add('hidden');
        }

        function showAlert(quake) {
            const mag = quake.properties.mag;
            const place = quake.properties.place || "Unknown location";
            const time = new Date(quake.properties.time).toLocaleString();

            document.getElementById('alertMag').innerHTML = `${mag} Magnitude <span class="text-red-200">🚨</span>`;
            document.getElementById('alertPlace').textContent = place;
            document.getElementById('alertTime').textContent = time;

            const popup = document.getElementById('alertPopup');
            popup.classList.remove('hidden');
            popup.style.display = 'block';

            if (navigator.vibrate) navigator.vibrate(mag >= 7 ? [300, 150, 300] : [200, 100, 200]);

            setTimeout(() => closeAlert(), 10000);
        }

        function closeAlert() {
            const popup = document.getElementById('alertPopup');
            popup.style.display = 'none';
        }

        function updateList(filtered = null) {
            const container = document.getElementById('earthquakeList');
            const quakes = filtered || currentData.slice(0, 35);
            quakes.sort((a,b) => b.properties.time - a.properties.time);

            let html = '';
            quakes.forEach((f, i) => {
                const p = f.properties;
                const mag = p.mag || 0;
                const warning = mag >= 5 ? '<span class="text-red-500">!!!!</span> ' : '';
                html += `
                    <div onclick="zoomToQuake(${i});" class="quake-item bg-zinc-900 border border-zinc-700 p-4 rounded-3xl cursor-pointer">
                        <div class="flex gap-4">
                            <div style="background:${getMagColor(mag)}" class="w-11 h-11 rounded-2xl flex items-center justify-center text-white font-bold text-xl flex-shrink-0">
                                ${mag}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="font-medium text-[15px] leading-tight">${warning}${p.place || 'Unknown'}</p>
                                <p class="text-xs text-zinc-400 mt-1">${getTimeAgo(p.time)}</p>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || '<p class="text-center py-10 text-zinc-500 text-sm">No recent activity</p>';
            document.getElementById('count').textContent = quakes.length;
        }

        function getTimeAgo(ts) {
            const m = Math.floor((Date.now() - ts) / 60000);
            return m < 1 ? "Just now" : m < 60 ? `${m}m ago` : `${Math.floor(m/60)}h ago`;
        }

        function getUserLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
                map.flyTo([userLat, userLon], 8.5, { duration: 1.2 });
                if (window.userMarker) map.removeLayer(window.userMarker);
                window.userMarker = L.marker([userLat, userLon]).addTo(map).bindPopup("📍 Your Location").openPopup();

                isWorldwide = false;
                updateToggleButton();
                filterLocalQuakes();
            }, () => alert("GPS access denied."));
        }

        function filterLocalQuakes() {
            if (!userLat) return;
            const local = currentData.filter(f => {
                const c = f.geometry.coordinates;
                return getDistance(userLat, userLon, c[1], c[0]) < 1000;
            });
            quakeCluster.clearLayers();
            local.forEach(f => quakeCluster.addLayer(createQuakeMarker(f)));
            updateList(local);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function zoomToQuake(i) {
            const f = currentData[i];
            if (f) map.flyTo([f.geometry.coordinates[1], f.geometry.coordinates[0]], 10, { duration: 1 });
        }

        function updateToggleButton() {
            const icon = document.getElementById('viewIcon');
            const text = document.getElementById('viewText');
            if (isWorldwide) {
                icon.textContent = '🌐';
                text.textContent = 'World';
            } else {
                icon.textContent = '📍';
                text.textContent = 'Local';
            }
        }

        function toggleView() {
            isWorldwide = !isWorldwide;
            updateToggleButton();
            if (isWorldwide) {
                fetchEarthquakes();
                fetchTsunamiWarnings();
            } else if (userLat) filterLocalQuakes();
            else getUserLocation();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            // Force a reflow to ensure transition works
            sidebar.style.transition = 'none';
            void sidebar.offsetHeight;
            sidebar.style.transition = 'transform 0.5s cubic-bezier(0.32, 0.72, 0, 1)';
            
            sidebar.classList.toggle('open');
        }

        function showSafetyModal() {
            document.getElementById('safetyModal').classList.remove('hidden');
            document.getElementById('safetyModal').classList.add('flex');
        }

        function closeSafetyModal() {
            const modal = document.getElementById('safetyModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            const body = document.body;
            
            if (isDarkMode) {
                body.classList.remove('light');
                document.getElementById('themeBtn').innerHTML = '🌙';
            } else {
                body.classList.add('light');
                document.getElementById('themeBtn').innerHTML = '☀️';
            }
            
            localStorage.setItem('quakeWatchDarkMode', isDarkMode);
        }

        function loadTheme() {
            const saved = localStorage.getItem('quakeWatchDarkMode');
            if (saved !== null) isDarkMode = saved === 'true';
            if (!isDarkMode) {
                document.body.classList.add('light');
                document.getElementById('themeBtn').innerHTML = '☀️';
            }
        }

        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let quakeCluster = L.markerClusterGroup({
            maxClusterRadius: 50,
            disableClusteringAtZoom: 12
        }).addTo(map);

        setInterval(() => {
            if (isWorldwide) {
                fetchEarthquakes();
                fetchTsunamiWarnings();
            }
        }, 90000);

        window.onload = () => {
            fetchEarthquakes();
            fetchTsunamiWarnings();
            updateToggleButton();
            loadTheme();
            
            // Ensure sidebar is in correct initial state
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('open')) {
                sidebar.style.transform = 'translateY(calc(100% - 70px))';
            }
        };
    </script>
</body>
</html>
