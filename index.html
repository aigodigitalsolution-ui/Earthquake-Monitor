<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuakeWatch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        #map { position: absolute; inset: 0; z-index: 1; }
        .header { z-index: 50; }
        .bottom-sheet { z-index: 60; }
        .quake-item {
            transition: all 0.2s ease;
        }
        .quake-item:active {
            transform: scale(0.97);
            background-color: #18181b;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden h-screen relative">
    <header class="header absolute top-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-lg p-4 border-b border-zinc-800 z-50">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🌍</span>
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter">QuakeWatch</h1>
                    <p class="text-xs text-emerald-400">USGS Live Monitor</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleView()" id="viewBtn" 
                        class="px-6 py-2.5 bg-zinc-900 border border-zinc-700 rounded-3xl text-sm font-medium">
                    <span id="viewText">🌍 World</span>
                </button>
                <button onclick="getUserLocation()" 
                        class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-sm font-medium">
                    📍 Local
                </button>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <!-- Bottom Sheet -->
    <div id="sidebar" class="bottom-sheet fixed bottom-0 left-0 right-0 bg-zinc-900 rounded-t-3xl max-h-[85vh] flex flex-col shadow-2xl z-[60] translate-y-[calc(100%-80px)]">
        <div onclick="toggleSidebar()" class="w-12 h-1.5 bg-zinc-600 rounded-full mx-auto mt-3 cursor-grab"></div>
        
        <div class="px-6 py-4 border-b border-zinc-700 font-semibold flex justify-between">
            <span>Recent Earthquakes</span>
            <span id="count" class="text-xs bg-zinc-800 px-3 py-1 rounded-full"></span>
        </div>
        
        <div id="earthquakeList" class="flex-1 overflow-auto p-4 space-y-3"></div>
    </div>

    <script>
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let allQuakesLayer = L.layerGroup().addTo(map);
        let localQuakesLayer = L.layerGroup();
        let currentData = [];
        let userLat = null;
        let userLon = null;
        let isWorldwide = true;

        function getMagColor(mag) {
            if (mag >= 7) return '#ef4444';
            if (mag >= 6) return '#f97316';
            if (mag >= 5) return '#eab308';
            return '#84cc16';
        }

        function createQuakeMarker(feature) {
            const props = feature.properties;
            const coords = feature.geometry.coordinates;
            const mag = props.mag || 0;

            const marker = L.circleMarker([coords[1], coords[0]], {
                radius: Math.max(8, mag * 2.8),
                fillColor: getMagColor(mag),
                color: '#fff',
                weight: 3,
                fillOpacity: 0.9
            });

            marker.bindPopup(`
                <div class="text-sm">
                    <strong>${mag}</strong> — ${props.place || 'Unknown'}<br>
                    <small>${new Date(props.time).toLocaleString()}</small>
                </div>
            `);
            return marker;
        }

        async function fetchEarthquakes() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
                const data = await res.json();
                currentData = data.features;

                allQuakesLayer.clearLayers();
                currentData.forEach(f => allQuakesLayer.addLayer(createQuakeMarker(f)));
                updateList();
            } catch(e) { console.error(e); }
        }

        function updateList(filtered = null) {
            const container = document.getElementById('earthquakeList');
            const quakes = filtered || currentData.slice(0, 35);
            quakes.sort((a, b) => b.properties.time - a.properties.time);

            let html = '';
            quakes.forEach((feature, index) => {
                const p = feature.properties;
                const mag = p.mag || 0;
                html += `
                    <div onclick="selectQuake(${index}); event.stopImmediatePropagation();" 
                         class="quake-item bg-zinc-900 border border-zinc-700 p-5 rounded-3xl cursor-pointer hover:border-zinc-400">
                        <div class="flex gap-5">
                            <div style="background: ${getMagColor(mag)}" 
                                 class="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-bold text-3xl flex-shrink-0">
                                ${mag}
                            </div>
                            <div class="flex-1 pt-1">
                                <div class="font-medium leading-tight">${p.place || 'Unknown location'}</div>
                                <div class="text-xs text-zinc-400 mt-2">${getTimeAgo(p.time)}</div>
                            </div>
                        </div>
                    </div>`;
            });

            container.innerHTML = html || '<p class="text-center py
