<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuakeWatch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        #map { position: absolute; inset: 0; z-index: 1; }
        .header { z-index: 50; }
        .bottom-sheet { z-index: 60; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden h-screen relative">
    <header class="header absolute top-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-lg p-4 border-b border-zinc-800">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🌍</span>
                <div>
                    <h1 class="text-2xl font-bold">QuakeWatch</h1>
                    <p class="text-xs text-emerald-400">USGS Real-time</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleView()" id="viewBtn" class="px-6 py-2 bg-zinc-900 border border-zinc-700 rounded-3xl text-sm">
                    <span id="viewText">🌍 World</span>
                </button>
                <button onclick="getUserLocation()" class="px-5 py-2 bg-emerald-600 rounded-3xl text-sm font-medium">📍 Local</button>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <!-- Bottom Sheet -->
    <div id="sidebar" class="bottom-sheet fixed bottom-0 left-0 right-0 bg-zinc-900 rounded-t-3xl max-h-[85vh] flex flex-col translate-y-[calc(100%-80px)] shadow-2xl">
        <div class="w-12 h-1.5 bg-zinc-500 rounded-full mx-auto mt-3" onclick="toggleSidebar()"></div>
        <div class="p-5 border-b border-zinc-700 font-semibold">Recent Earthquakes</div>
        <div id="earthquakeList" class="flex-1 overflow-auto p-4 space-y-3"></div>
    </div>

    <script>
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let allQuakesLayer = L.layerGroup().addTo(map);
        let localQuakesLayer = L.layerGroup();
        let currentData = [];
        let userLat = null;
        let userLon = null;
        let isWorldwide = true;

        function getMagColor(mag) {
            if (mag >= 7) return '#ef4444';
            if (mag >= 6) return '#f97316';
            if (mag >= 5) return '#eab308';
            return '#84cc16';
        }

        function createQuakeMarker(feature) {
            const props = feature.properties;
            const [lon, lat, depth] = feature.geometry.coordinates;
            const mag = props.mag || 0;

            const marker = L.circleMarker([lat, lon], {
                radius: Math.max(8, mag * 2.8),
                fillColor: getMagColor(mag),
                color: '#fff',
                weight: 3,
                fillOpacity: 0.9
            });

            marker.bindPopup(`<b>${mag}</b> — ${props.place}<br>Depth: ${depth ? depth.toFixed(1) : '?'} km`);
            return marker;
        }

        async function fetchEarthquakes() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
                const data = await res.json();
                currentData = data.features;

                allQuakesLayer.clearLayers();
                currentData.forEach(f => allQuakesLayer.addLayer(createQuakeMarker(f)));
                updateList();
            } catch(e) { console.error(e); }
        }

        function updateList(filtered = null) {
            const el = document.getElementById('earthquakeList');
            const data = filtered || currentData.slice(0, 30);
            data.sort((a,b) => b.properties.time - a.properties.time);

            let html = '';
            data.forEach((f, i) => {
                const p = f.properties;
                const mag = p.mag || 0;
                html += `
                    <div onclick="zoomToQuake(${i})" class="bg-zinc-900 border border-zinc-700 p-4 rounded-3xl cursor-pointer hover:border-emerald-500">
                        <div class="flex gap-4">
                            <div style="background:${getMagColor(mag)}" class="w-12 h-12 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">${mag}</div>
                            <div class="flex-1">
                                <div class="font-medium">${p.place}</div>
                                <div class="text-xs text-zinc-400">${getTimeAgo(p.time)}</div>
                            </div>
                        </div>
                    </div>`;
            });
            el.innerHTML = html;
        }

        function getTimeAgo(ts) {
            const m = Math.floor((Date.now() - ts)/60000);
            return m < 1 ? "Just now" : m < 60 ? m+"m ago" : Math.floor(m/60)+"h ago";
        }

        function getUserLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation not supported in this browser.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;

                    map.flyTo([userLat, userLon], 9, {duration: 1.2});

                    // User marker
                    if (window.userMarker) map.removeLayer(window.userMarker);
                    window.userMarker = L.marker([userLat, userLon]).addTo(map)
                        .bindPopup("📍 Your Location").openPopup();

                    isWorldwide = false;
                    document.getElementById('viewText').innerHTML = '📍 Local';

                    filterLocalQuakes();
                    toggleSidebar();
                },
                (error) => {
                    let msg = "Location error: ";
                    if (error.code === 1) msg += "Permission denied. Please allow GPS.";
                    else if (error.code === 2) msg += "Position unavailable.";
                    else if (error.code === 3) msg += "Timeout.";
                    else msg += "Unknown error.";
                    alert(msg + "\n\nTip: Try on HTTPS (not local file).");
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        }

        function filterLocalQuakes() {
            if (!userLat || !userLon || !currentData.length) return;

            const local = currentData.filter(f => {
                const c = f.geometry.coordinates;
                return getDistance(userLat, userLon, c[1], c[0]) < 1000;
            });

            localQuakesLayer.clearLayers();
            local.forEach(f => localQuakesLayer.addLayer(createQuakeMarker(f)));

            allQuakesLayer.removeFrom(map);
            localQuakesLayer.addTo(map);
            updateList(local);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function zoomToQuake(i) {
            const f = currentData[i];
            if (f) map.flyTo([f.geometry.coordinates[1], f.geometry.coordinates[0]], 10);
        }

        function toggleView() {
            isWorldwide = !isWorldwide;
            document.getElementById('viewText').innerHTML = isWorldwide ? '🌍 World' : '📍 Local';
            if (isWorldwide) {
                localQuakesLayer.removeFrom(map);
                allQuakesLayer.addTo(map);
                updateList();
            } else if (userLat) {
                filterLocalQuakes();
            } else {
                getUserLocation();
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        setInterval(() => { if (isWorldwide) fetchEarthquakes(); }, 120000);

        window.onload = fetchEarthquakes;
    </script>
</body>
</html>
