<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuakeWatch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        #map { position: absolute; inset: 0; z-index: 1; }
        .header { z-index: 50; }
        .bottom-sheet { z-index: 60; transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        .bottom-sheet.open { transform: translateY(0) !important; }
        .leaflet-marker-icon { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4)); }
    </style>
</head>
<body class="bg-black text-white overflow-hidden h-screen relative">
    <header class="header absolute top-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-lg p-3 border-b border-zinc-800 z-50">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🌍</span>
                <div>
                    <h1 class="text-xl font-bold">QuakeWatch</h1>
                    <p class="text-[10px] text-emerald-400">USGS Live</p>
                </div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="toggleView()" id="viewBtn" class="px-4 py-2 text-sm bg-zinc-900 border border-zinc-700 rounded-3xl">🌍 <span id="viewText">World</span></button>
                <button onclick="getUserLocation()" class="px-4 py-2 text-sm bg-emerald-600 rounded-3xl">📍 Local</button>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <!-- Bottom Sheet -->
    <div id="sidebar" class="bottom-sheet fixed bottom-0 left-0 right-0 bg-zinc-900 rounded-t-3xl shadow-2xl flex flex-col max-h-[82vh] translate-y-[calc(100%-70px)]">
        <div onclick="toggleSidebar()" class="w-11 h-1 bg-zinc-600 rounded-full mx-auto mt-3"></div>
        <div class="px-5 py-3 border-b flex justify-between text-sm">
            <span>Recent Earthquakes</span>
            <span id="count" class="text-xs bg-zinc-800 px-3 py-0.5 rounded-full"></span>
        </div>
        <div id="earthquakeList" class="flex-1 overflow-auto p-3 space-y-3"></div>
    </div>

    <button onclick="toggleSidebar()" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-zinc-900 border border-zinc-600 px-7 py-3 rounded-3xl text-sm font-medium z-[70]">
        📋 Recent
    </button>

    <script>
        // Initialize map
        const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Marker Cluster Group (Performance boost)
        let quakeCluster = L.markerClusterGroup({
            maxClusterRadius: 50,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            disableClusteringAtZoom: 12
        }).addTo(map);

        let currentData = [];
        let userLat = null, userLon = null;
        let isWorldwide = true;

        function getMagColor(mag) {
            if (mag >= 7) return '#ef4444';
            if (mag >= 6) return '#f97316';
            if (mag >= 5) return '#eab308';
            return '#84cc16';
        }

        function createQuakeMarker(feature) {
            const p = feature.properties;
            const [lon, lat] = feature.geometry.coordinates;
            const mag = p.mag || 0;

            const marker = L.circleMarker([lat, lon], {
                radius: Math.max(6, Math.min(mag * 2.5, 12)),
                fillColor: getMagColor(mag),
                color: '#ffffff',
                weight: 2,
                fillOpacity: 0.85
            });

            marker.bindPopup(`<b>${mag}</b> — ${p.place || 'Unknown'}<br><small>${new Date(p.time).toLocaleString()}</small>`);
            return marker;
        }

        async function fetchEarthquakes() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
                const data = await res.json();
                currentData = data.features;

                // Clear and re-add with clustering
                quakeCluster.clearLayers();
                currentData.forEach(f => {
                    if (f.properties.mag >= 2.5) { // Filter minor quakes for performance
                        quakeCluster.addLayer(createQuakeMarker(f));
                    }
                });

                updateList();
            } catch(e) { console.error(e); }
        }

        function updateList(filtered = null) {
            const container = document.getElementById('earthquakeList');
            const quakes = filtered || currentData.slice(0, 30);
            quakes.sort((a,b) => b.properties.time - a.properties.time);

            let html = '';
            quakes.forEach((feature, index) => {
                const p = feature.properties;
                const mag = p.mag || 0;
                html += `
                    <div onclick="zoomToQuake(${index});" class="bg-zinc-900 border border-zinc-700 p-4 rounded-3xl cursor-pointer active:bg-zinc-800">
                        <div class="flex gap-4">
                            <div style="background:${getMagColor(mag)}" class="w-11 h-11 rounded-2xl flex items-center justify-center text-white font-bold text-xl flex-shrink-0">
                                ${mag}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="font-medium text-[15px] leading-tight">${p.place || 'Unknown'}</p>
                                <p class="text-xs text-zinc-400 mt-1">${getTimeAgo(p.time)}</p>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || '<p class="text-center py-10 text-zinc-500">No recent activity</p>';
            document.getElementById('count').textContent = quakes.length;
        }

        function getTimeAgo(ts) {
            const m = Math.floor((Date.now() - ts) / 60000);
            return m < 1 ? "Just now" : m < 60 ? `${m}m ago` : `${Math.floor(m/60)}h ago`;
        }

        function getUserLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
                map.flyTo([userLat, userLon], 8.5);
                isWorldwide = false;
                document.getElementById('viewText').innerHTML = '📍 Local';
                filterLocalQuakes();
            }, () => alert("GPS unavailable."));
        }

        function filterLocalQuakes() {
            if (!userLat) return;
            const local = currentData.filter(f => {
                const c = f.geometry.coordinates;
                return getDistance(userLat, userLon, c[1], c[0]) < 1000;
            });
            quakeCluster.clearLayers();
            local.forEach(f => quakeCluster.addLayer(createQuakeMarker(f)));
            updateList(local);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function zoomToQuake(i) {
            const f = currentData[i];
            if (f) map.flyTo([f.geometry.coordinates[1], f.geometry.coordinates[0]], 11);
        }

        function toggleView() {
            isWorldwide = !isWorldwide;
            document.getElementById('viewText').innerHTML = isWorldwide ? '🌍 World' : '📍 Local';
            if (isWorldwide) {
                fetchEarthquakes();
            } else if (userLat) {
                filterLocalQuakes();
            } else {
                getUserLocation();
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Refresh every 2 minutes
        setInterval(() => { if (isWorldwide) fetchEarthquakes(); }, 120000);

        window.onload = fetchEarthquakes;
    </script>
</body>
</html>
