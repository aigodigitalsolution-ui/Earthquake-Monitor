<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuakeWatch - Real-Time Earthquakes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1e2937;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #22d3ee, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 0.9rem;
        }
        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 12px;
            padding: 16px;
            width: 340px;
            max-height: 75vh;
            overflow-y: auto;
            border: 1px solid #334155;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        .quake-list { max-height: 420px; overflow-y: auto; }
        .quake-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #1e2937;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #22d3ee;
        }
        .quake-item:hover { transform: translateX(4px); background: #334155; }
        .magnitude { font-size: 1.35rem; font-weight: bold; }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.95);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid #334155;
            z-index: 1000;
        }
        .status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.85rem;
            z-index: 1000;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>🌍 QuakeWatch</h1>
            <p style="font-size: 0.9rem; color: #64748b;">Real-time Worldwide Earthquakes</p>
        </div>
        <div class="status-bar">
            <span><span class="live-dot"></span> LIVE via WebSocket</span>
            <button onclick="toggleWebSocket()" id="ws-btn">WebSocket ON</button>
            <button onclick="refreshData()">↻ Refresh</button>
        </div>
    </header>
    
    <div class="map-container">
        <div id="map"></div>
        
        <div class="info-panel">
            <h3 style="margin-bottom: 12px; color: #67e8f9;">Live Events</h3>
            <div id="quake-list" class="quake-list"></div>
        </div>
        
        <div class="legend">
            <strong>Magnitude</strong><br>
            <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                <span style="background:#22d3ee;width:18px;height:18px;border-radius:50%;display:inline-block;"></span> &lt; 4.0
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="background:#eab308;width:18px;height:18px;border-radius:50%;display:inline-block;"></span> 4–5.9
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="background:#f97316;width:18px;height:18px;border-radius:50%;display:inline-block;"></span> 6–6.9
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span style="background:#ef4444;width:18px;height:18px;border-radius:50%;display:inline-block;"></span> ≥ 7.0
            </div>
        </div>
        
        <div class="status" id="status">Connecting to live feed...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let earthquakeLayer = L.layerGroup().addTo(map);
        let userMarker = null;
        let userCircle = null;
        let ws = null;
        let isWsConnected = false;
        let earthquakes = new Map(); // id -> feature

        function getColor(m) {
            if (m >= 7) return '#ef4444';
            if (m >= 6) return '#f97316';
            if (m >= 4) return '#eab308';
            return '#22d3ee';
        }

        function getRadius(m) {
            return Math.max(6, Math.pow(m, 1.6) * 1.8);
        }

        function formatTime(time) {
            const diff = Date.now() - new Date(time);
            const mins = Math.floor(diff / 60000);
            return mins < 1 ? 'Just now' : mins < 60 ? `\( {mins}m ago` : ` \){Math.floor(mins/60)}h ago`;
        }

        // Add or update marker
        function addOrUpdateMarker(feature) {
            const id = feature.id || feature.properties.id;
            const props = feature.properties;
            const coords = feature.geometry.coordinates;
            const lat = coords[1], lng = coords[0];
            const mag = parseFloat(props.mag || 0);

            // Remove old if exists
            if (earthquakes.has(id)) {
                const old = earthquakes.get(id).marker;
                if (old) earthquakeLayer.removeLayer(old);
            }

            const marker = L.circleMarker([lat, lng], {
                radius: getRadius(mag),
                fillColor: getColor(mag),
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(earthquakeLayer);

            marker.bindPopup(`
                <b>M${mag.toFixed(1)}</b><br>
                ${props.place || props.flynn_region || 'Unknown'}<br>
                <small>${new Date(props.time || props.updated).toLocaleString()}</small><br>
                Depth: ${(coords[2] || props.depth || 0).toFixed(1)} km
            `);

            marker.on('click', () => map.flyTo([lat, lng], 8));

            earthquakes.set(id, { feature, marker });
        }

        // Render list (latest 12)
        function renderList() {
            const listEl = document.getElementById('quake-list');
            listEl.innerHTML = '';

            const sorted = Array.from(earthquakes.values())
                .sort((a, b) => new Date(b.feature.properties.time || b.feature.properties.updated) - new Date(a.feature.properties.time || a.feature.properties.updated));

            sorted.slice(0, 12).forEach(item => {
                const props = item.feature.properties;
                const mag = parseFloat(props.mag || 0);
                const div = document.createElement('div');
                div.className = 'quake-item';
                div.innerHTML = `
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <span class="magnitude" style="color:\( {getColor(mag)}">M \){mag.toFixed(1)}</span>
                            <div style="font-size:0.9rem;margin-top:4px;">${props.place || props.flynn_region || 'Unknown location'}</div>
                        </div>
                        <div style="text-align:right;font-size:0.8rem;color:#64748b;">
                            ${formatTime(props.time || props.updated)}
                        </div>
                    </div>
                `;
                div.onclick = () => {
                    const coords = item.feature.geometry.coordinates;
                    map.flyTo([coords[1], coords[0]], 8);
                    item.marker.openPopup();
                };
                listEl.appendChild(div);
            });
        }

        // Fetch initial USGS data
        async function fetchInitialData() {
            try {
                const res = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
                const data = await res.json();
                
                data.features.forEach(f => {
                    addOrUpdateMarker(f);
                });
                renderList();
                document.getElementById('status').textContent = `Loaded ${data.features.length} events`;
            } catch (e) {
                console.error(e);
            }
        }

        // EMSC WebSocket
        function connectWebSocket() {
            if (ws) ws.close();
            
            ws = new WebSocket('wss://www.seismicportal.eu/standing_order/websocket');
            
            ws.onopen = () => {
                isWsConnected = true;
                document.getElementById('ws-btn').textContent = 'WebSocket ON ✓';
                document.getElementById('status').innerHTML = '✅ Connected to live EMSC WebSocket';
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.action === 'create' || data.action === 'update') {
                        const feature = {
                            id: data.unid,
                            type: "Feature",
                            geometry: {
                                type: "Point",
                                coordinates: [parseFloat(data.lon), parseFloat(data.lat), parseFloat(data.depth)]
                            },
                            properties: {
                                mag: parseFloat(data.mag),
                                place: data.flynn_region,
                                time: data.time,
                                updated: data.updated || Date.now(),
                                ...data
                            }
                        };
                        
                        addOrUpdateMarker(feature);
                        renderList();
                        
                        // Flash effect on new big quake
                        if (parseFloat(data.mag) >= 5.5) {
                            const status = document.getElementById('status');
                            status.style.transition = 'all 0.3s';
                            status.style.background = '#ef4444';
                            setTimeout(() => {
                                status.style.background = 'rgba(15, 23, 42, 0.95)';
                            }, 800);
                        }
                    }
                } catch (err) {}
            };
            
            ws.onclose = () => {
                isWsConnected = false;
                document.getElementById('ws-btn').textContent = 'Reconnect WebSocket';
            };
            
            ws.onerror = () => {
                console.error('WebSocket error');
            };
        }

        function toggleWebSocket() {
            if (isWsConnected) {
                if (ws) ws.close();
                document.getElementById('ws-btn').textContent = 'WebSocket OFF';
            } else {
                connectWebSocket();
            }
        }

        function refreshData() {
            earthquakeLayer.clearLayers();
            earthquakes.clear();
            fetchInitialData();
        }

        // User location
        function toggleUserLocation() {
            if (userMarker) {
                map.removeLayer(userMarker);
                if (userCircle) map.removeLayer(userCircle);
                userMarker = userCircle = null;
                return;
            }
            
            navigator.geolocation.getCurrentPosition(pos => {
                const {latitude, longitude, accuracy} = pos.coords;
                userMarker = L.marker([latitude, longitude], {icon: L.divIcon({className:'custom-pin', html:'📍', iconSize:[30,30]})}).addTo(map);
                userCircle = L.circle([latitude, longitude], {radius: accuracy, color:'#67e8f9', fillOpacity:0.15}).addTo(map);
                map.flyTo([latitude, longitude], 8);
            });
        }

        // Initialize
        function init() {
            fetchInitialData();
            connectWebSocket(); // Start live updates immediately
            
            // Keyboard shortcut
            document.addEventListener('keydown', e => {
                if (e.key.toLowerCase() === 'r') refreshData();
            });
            
            L.control.scale().addTo(map);
        }

        window.onload = init;
    </script>
</body>
</html>
